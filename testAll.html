<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tests</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: sans-serif;
            background: #f0f0f0;
            color: #222;
        }
        h1 {
            text-align: center;
            margin-bottom: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 16px;
        }
        .cell {
            position: relative;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .error-overlay {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 50%;
            overflow-y: auto;
            background: rgba(180, 0, 0, 0.9);
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            padding: 6px 8px;
            pointer-events: auto;
            z-index: 10;
        }
        .error-overlay.visible {
            display: block;
        }
        .error-overlay div {
            margin-bottom: 4px;
            word-wrap: break-word;
        }
        .cell h2 {
            margin: 0;
            padding: 6px 10px;
            font-size: 14px;
            background: #e0e0e0;
            color: #222;
        }
        .cell iframe {
            width: 100%;
            height: 360px;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <h1>All Tests &amp; Games</h1>
    <div class="grid">
        <div class="cell">
            <h2>index</h2>
            <iframe src="index.html"></iframe>
        </div>
        <div class="cell">
            <h2>gameCards</h2>
            <iframe src="gameCards.html"></iframe>
        </div>
        <div class="cell">
            <h2>gameMerge</h2>
            <iframe src="gameMerge.html"></iframe>
        </div>
        <div class="cell">
            <h2>gamePlatform</h2>
            <iframe src="gamePlatform.html"></iframe>
        </div>
        <div class="cell">
            <h2>gameTopDown</h2>
            <iframe src="gameTopDown.html"></iframe>
        </div>
        <div class="cell">
            <h2>testEvent</h2>
            <iframe src="testEvent.html"></iframe>
        </div>
        <div class="cell">
            <h2>testInputEvents</h2>
            <iframe src="testInputEvents.html"></iframe>
        </div>
        <div class="cell">
            <h2>testLoadSceneAdditive</h2>
            <iframe src="testLoadSceneAdditive.html"></iframe>
        </div>
        <div class="cell">
            <h2>testMouseEvents</h2>
            <iframe src="testMouseEvents.html"></iframe>
        </div>
        <div class="cell">
            <h2>testPointPolygonCollisions</h2>
            <iframe src="testPointPolygonCollisions.html"></iframe>
        </div>
        <div class="cell">
            <h2>testPolygonPolygonCollisions</h2>
            <iframe src="testPolygonPolygonCollisions.html"></iframe>
        </div>
        <div class="cell">
            <h2>testRigidBodyAcceleration</h2>
            <iframe src="testRigidBodyAcceleration.html"></iframe>
        </div>
        <div class="cell">
            <h2>testSceneSwitch</h2>
            <iframe src="testSceneSwitch.html"></iframe>
        </div>
        <div class="cell">
            <h2>testTriggerEvents</h2>
            <iframe src="testTriggerEvents.html"></iframe>
        </div>
    </div>
    <script>
        // Listen for error messages posted from iframes
        window.addEventListener('message', e => {
            if (e.data && e.data.type === '__iframe_error__') {
                const iframe = document.querySelector('iframe[data-id="' + e.data.id + '"]');
                if (!iframe) return;
                const overlay = iframe.closest('.cell').querySelector('.error-overlay');
                const line = document.createElement('div');
                line.textContent = e.data.message;
                overlay.appendChild(line);
                overlay.classList.add('visible');
            }
        });

        const baseUrl = new URL('./', location.href).href;

        document.querySelectorAll('.cell').forEach((cell, i) => {
            const iframe = cell.querySelector('iframe');
            const src = iframe.getAttribute('src');
            iframe.removeAttribute('src');
            iframe.setAttribute('data-id', i);

            const overlay = document.createElement('div');
            overlay.className = 'error-overlay';
            cell.appendChild(overlay);

            fetch(src)
                .then(r => {
                    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
                    return r.text();
                })
                .then(html => {
                    // Script injected before all other scripts to catch init errors
                    const errorScript =
                        '<script>' +
                        '(function(){' +
                        'var _id=' + i + ';' +
                        'window.addEventListener("error",function(e){' +
                        'var loc=e.filename?(" ("+e.filename.split("/").pop()+":"+e.lineno+")"):"";' +
                        'parent.postMessage({type:"__iframe_error__",id:_id,message:e.message+loc},"*");' +
                        '});' +
                        'window.addEventListener("unhandledrejection",function(e){' +
                        'parent.postMessage({type:"__iframe_error__",id:_id,message:"Unhandled rejection: "+e.reason},"*");' +
                        '});' +
                        'var _origErr=console.error;' +
                        'console.error=function(){' +
                        'var a=Array.prototype.slice.call(arguments);' +
                        'var m=a.map(function(x){return typeof x==="object"?JSON.stringify(x):String(x)}).join(" ");' +
                        'parent.postMessage({type:"__iframe_error__",id:_id,message:m},"*");' +
                        '_origErr.apply(console,a);' +
                        '};' +
                        '})();' +
                        '<\/script>';

                    const baseTag = '<base href="' + baseUrl + '">';

                    // Inject right after <head> so it runs before any other scripts
                    const headMatch = html.match(/<head[^>]*>/i);
                    if (headMatch) {
                        const pos = headMatch.index + headMatch[0].length;
                        html = html.slice(0, pos) + baseTag + errorScript + html.slice(pos);
                    } else {
                        html = baseTag + errorScript + html;
                    }

                    iframe.srcdoc = html;
                })
                .catch(err => {
                    const line = document.createElement('div');
                    line.textContent = 'Failed to load ' + src + ': ' + err.message;
                    overlay.appendChild(line);
                    overlay.classList.add('visible');
                });
        });
    </script>
</body>
</html>
